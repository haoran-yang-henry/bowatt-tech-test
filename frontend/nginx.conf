server {
    listen 80;

    # Serve the built single-page app.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # Reverse-proxy API calls to the backend container.
    location /api/ {
        proxy_pass http://backend:8787;
        proxy_http_version 1.1;

        # Streaming: disable buffering so /api/research is forwarded to the
        # browser token-by-token instead of being held until the response ends.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
    }
}
