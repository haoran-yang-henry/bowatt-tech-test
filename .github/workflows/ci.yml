name: CI

# Run on pushes to the main branch and on every pull request. The path filters
# keep a backend-only change from spending time on the frontend job and vice
# versa, while workflow edits always run both.
on:
  push:
    branches: [master]
  pull_request:

# A newer push to the same branch/PR cancels the older, still-running CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend (build · vet · gofmt)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Match backend/Dockerfile (golang:1.23) and go.mod (1.23.4). The
          # backend is standard-library only (no go.sum), so module caching is
          # left off — there is nothing to download or cache.
          go-version: '1.23'
          cache: false

      - name: gofmt (fail on unformatted files)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race detector on)
        run: go test -race ./...

  frontend:
    name: frontend (lint · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match frontend/Dockerfile (node:22-alpine).
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck and build
        # `npm run build` is `tsc -b && vite build`, so this covers both the
        # TypeScript typecheck and the production bundle.
        run: npm run build
